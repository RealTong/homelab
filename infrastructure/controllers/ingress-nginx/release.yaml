apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.x"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      replicaCount: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: controller
                    app.kubernetes.io/instance: nginx-ingress
                    app.kubernetes.io/name: ingress-nginx
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/instance: nginx-ingress
              app.kubernetes.io/name: ingress-nginx
      service:
        type: LoadBalancer
        loadBalancerIP: 10.0.0.145
        externalTrafficPolicy: Local
      extraArgs:
        default-ssl-certificate: default/realtong-cn-wildcard-tls
      config:
        custom-http-errors: "404,500,502,503,504"
        enable-underscores-in-headers: "true"
    defaultBackend:
      enabled: true
      image:
        registry: ghcr.io
        image: tarampampam/error-pages
        tag: "3.8.1"
      extraVolumeMounts:
        - name: error-pages-templates
          mountPath: /opt/error-pages
          readOnly: true
      extraVolumes:
        - name: error-pages-templates
          configMap:
            name: ingress-nginx-error-pages-templates
      extraEnvs:
        - name: ADD_TEMPLATE
          value: /opt/error-pages/lost-in-space-realtong.html
        - name: TEMPLATE_NAME
          value: lost-in-space-realtong
        - name: SHOW_DETAILS
          value: "true"
        - name: SEND_SAME_HTTP_CODE
          value: "true"
        - name: RESPONSE_PLAINTEXT_FORMAT
          value: |-
            Error {{ code }}: {{ message }}
            {{ description }}
            {{- if host }}

            Host: {{ host }}{{ end }}{{- if original_uri }}
            Original URI: {{ original_uri }}{{ end }}{{- if forwarded_for }}
            来源 IP: {{ index (strFields (strReplace forwarded_for "," " ")) 0 }}{{ end }}{{- if request_id }}
            Request ID: {{ request_id }}{{ end }}
