apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: gateway-system
spec:
  interval: 1h
  chart:
    spec:
      chart: envoy-gateway
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 24h
  install:
    createNamespace: true
  values:
    metrics:
      enabled: true
