apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sub2api
  namespace: homelab
  annotations:
    glance/icon: simple-icons:openai
    glance/name: "Sub2API"
    glance/url: "https://ai.wst.sh"
spec:
  hostnames:
    - ai.wst.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: sub2api
          port: 8080
          weight: 1
