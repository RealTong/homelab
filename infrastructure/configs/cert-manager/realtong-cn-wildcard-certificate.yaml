apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: realtong-cn-wildcard
  namespace: default
spec:
  secretName: realtong-cn-wildcard-tls
  privateKey:
    rotationPolicy: Always
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
  dnsNames:
    - realtong.cn
    - '*.realtong.cn'
  duration: 2160h
  renewBefore: 720h
