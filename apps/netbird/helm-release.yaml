apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird
  namespace: netbird
spec:
  interval: 5m
  chart:
    spec:
      chart: charts/netbird
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: netbird
        namespace: netbird
  maxHistory: 3
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    namespace: netbird
    
    dashboard:
      enabled: true
      ingress:
        enabled: false  # We use separate ingress resource for TLS termination
    
    management:
      type: deployment
      existingSecret: netbird-creds
      config:
        Domain: "netbird.wst.sh"
        UseExistingCertManager: true
        CertManagerClusterIssuer: mkcert-issuer
        EnableSingleAccountMode: false
        EnableUserEndpointGroups: false
        EnableGroupPropagation: false
        
    signal:
      type: deployment
      replicaCount: 1
    
    turn:
      type: deployment
      replicaCount: 1
      config:
        TURNPortRangeStart: 50000
        TURNPortRangeEnd: 60000
        # ExternalIP: set via NB_TURN_EXTERNAL_IP in Infisical
    
    # Use existing Postgres (you have postgresus)
    postgresql:
      enabled: false
    
    # Use existing Redis  
    redis:
      enabled: false
