apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netbird-creds
  namespace: netbird
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: netbird-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # NetBird Management JWT
        NB_MANAGEMENT_JWT_SECRET: "{{ .NB_MANAGEMENT_JWT_SECRET }}"
        
        # Postgres Connection
        NB_DATABASE_TYPE: "postgres"
        NB_DATABASE_URL: "postgresql://netbird:{{ NB_DB_PASSWORD }}@postgresus.databases.svc:5432/netbird?sslmode=disable"
        NB_DB_PASSWORD: "{{ .NB_DB_PASSWORD }}"
        
        # Redis (existing deployment in databases namespace)
        NB_REDIS_URL: "redis://redis.databases.svc:6379"
        NB_REDIS_PASSWORD: ""
        
        # TURN Server
        NB_TURN_PORT_START: "50000"
        NB_TURN_PORT_END: "60000"
        # Set your external IP manually in Infisical:
        # NB_TURN_EXTERNAL_IP: "<your-external-ip>"
        
        # Let's Encrypt / Cert-Manager
        NB_CERT_MANAGER_ENABLED: "true"
        NB_CERT_MANAGER_CLUSTER_ISSUER: "mkcert-issuer"
        
        # TURN credentials (min 32 chars each)
        NB_TURN_MIN_SECRET: "{{ .NB_TURN_MIN_SECRET }}"
        NB_TURN_MAX_SECRET: "{{ .NB_TURN_MAX_SECRET }}"
  data:
    - secretKey: NB_MANAGEMENT_JWT_SECRET
      remoteRef:
        key: /NetBird/NB_MANAGEMENT_JWT_SECRET
    - secretKey: NB_DB_PASSWORD
      remoteRef:
        key: /NetBird/NB_DB_PASSWORD
    - secretKey: NB_TURN_MIN_SECRET
      remoteRef:
        key: /NetBird/NB_TURN_MIN_SECRET
    - secretKey: NB_TURN_MAX_SECRET
      remoteRef:
        key: /NetBird/NB_TURN_MAX_SECRET
