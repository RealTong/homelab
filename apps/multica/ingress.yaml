apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-ingress
  namespace: homelab
  annotations:
    glance/icon: simple-icons:openai
    glance/name: "Multica"
    glance/url: "https://multica.realtong.cn"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - multica.realtong.cn
        - multica-api.realtong.cn
  rules:
    - host: multica-api.realtong.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
    - host: multica.realtong.cn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /readyz
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
