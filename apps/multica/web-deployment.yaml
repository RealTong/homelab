apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-web
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multica-web
  template:
    metadata:
      labels:
        app: multica-web
    spec:
      containers:
        - name: web
          image: ghcr.io/multica-ai/multica-web:v0.3.26
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: REMOTE_API_URL
              value: http://multica-backend:8080
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
