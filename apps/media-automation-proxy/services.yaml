apiVersion: v1
kind: Service
metadata:
  name: radarr-external
  namespace: homelab
spec:
  ports:
    - name: http
      port: 17878
      protocol: TCP
      targetPort: 17878
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: radarr-external
  namespace: homelab
subsets:
  - addresses:
      - ip: 10.0.0.100
    ports:
      - name: http
        port: 17878
        protocol: TCP
---
