apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: neko-master-clickhouse-secret
  namespace: databases
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  data:
    - secretKey: CH_DATABASE
      remoteRef:
        key: /NekoMaster/CH_DATABASE
    - secretKey: CH_USER
      remoteRef:
        key: /NekoMaster/CH_USER
    - secretKey: CH_PASSWORD
      remoteRef:
        key: /NekoMaster/CH_PASSWORD
