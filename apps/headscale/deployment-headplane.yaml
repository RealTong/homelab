apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headplane
  template:
    metadata:
      labels:
        app: headplane
    spec:
      containers:
        - name: headplane
          image: ghcr.io/tale/headplane:0.6.2
          env:
            - name: HEADPLANE_SERVER__COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_SERVER__COOKIE_SECRET
            - name: HEADPLANE_OIDC__ISSUER
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_OIDC__ISSUER
            - name: HEADPLANE_OIDC__CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_OIDC__CLIENT_ID
            - name: HEADPLANE_OIDC__CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_OIDC__CLIENT_SECRET
            - name: HEADPLANE_HEADSCALE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_HEADSCALE__API_KEY
            - name: HEADPLANE_OIDC__HEADSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: headplane-secret
                  key: HEADPLANE_HEADSCALE__API_KEY
          ports:
            - containerPort: 3000
          startupProbe:
            exec:
              command:
                - /bin/hp_healthcheck
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/hp_healthcheck
          readinessProbe:
            exec:
              command:
                - /bin/hp_healthcheck
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: headplane-config
              mountPath: /etc/headplane/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: headplane-data
              mountPath: /var/lib/headplane
      volumes:
        - name: headplane-config
          configMap:
            name: headplane-config
        - name: headplane-data
          persistentVolumeClaim:
            claimName: headplane-pvc
