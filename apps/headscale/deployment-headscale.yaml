apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      initContainers:
        - name: render-config
          image: python:3.14-alpine
          env:
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: headscale-secret
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: headscale-secret
                  key: OIDC_CLIENT_ID
          command:
            - python
            - -c
            - |
              from pathlib import Path
              import os
              template = Path('/config-template/config.yaml.tmpl').read_text()
              rendered = (template
                  .replace('__OIDC_ISSUER__', os.environ['OIDC_ISSUER'])
                  .replace('__OIDC_CLIENT_ID__', os.environ['OIDC_CLIENT_ID']))
              Path('/rendered/config.yaml').write_text(rendered)
          volumeMounts:
            - name: headscale-config-template
              mountPath: /config-template
              readOnly: true
            - name: headscale-config-rendered
              mountPath: /rendered
      containers:
        - name: headscale
          image: headscale/headscale:0.28.0
          args:
            - serve
          ports:
            - containerPort: 8080
            - containerPort: 9090
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: headscale-config-rendered
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: headscale-oidc-secret
              mountPath: /etc/headscale/oidc-secrets
              readOnly: true
            - name: headscale-data
              mountPath: /var/lib/headscale
            - name: headscale-run
              mountPath: /var/run/headscale
      volumes:
        - name: headscale-config-template
          configMap:
            name: headscale-config
        - name: headscale-config-rendered
          emptyDir: {}
        - name: headscale-oidc-secret
          secret:
            secretName: headscale-secret
        - name: headscale-data
          persistentVolumeClaim:
            claimName: headscale-pvc
        - name: headscale-run
          emptyDir: {}
