apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headscale
  template:
    metadata:
      labels:
        app: headscale
    spec:
      containers:
        - name: headscale
          image: headscale/headscale:0.28.0
          args:
            - serve
          ports:
            - containerPort: 8080
            - containerPort: 9090
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: headscale-config
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: headscale-data
              mountPath: /var/lib/headscale
            - name: headscale-run
              mountPath: /var/run/headscale
      volumes:
        - name: headscale-config
          configMap:
            name: headscale-config
        - name: headscale-data
          persistentVolumeClaim:
            claimName: headscale-pvc
        - name: headscale-run
          emptyDir: {}
