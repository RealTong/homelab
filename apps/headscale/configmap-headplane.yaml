apiVersion: v1
kind: ConfigMap
metadata:
  name: headplane-config
  namespace: homelab
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 3000
      base_url: https://headscale.realtong.cn
      cookie_secure: true
      cookie_max_age: 86400
      data_path: /var/lib/headplane

    headscale:
      url: http://headscale:8080
      public_url: https://headscale.realtong.cn
      config_path: /etc/headscale/config.yaml
      config_strict: true

    integration:
      agent:
        enabled: false
        pre_authkey: ""
      docker:
        enabled: false
      kubernetes:
        enabled: false
        pod_name: headscale
      proc:
        enabled: false
