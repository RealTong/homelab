apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-status-realtong-cn
  namespace: observability
spec:
  secretName: wildcard-status-realtong-cn-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
  privateKey:
    rotationPolicy: Always
  dnsNames:
    - status.realtong.cn
    - '*.status.realtong.cn'