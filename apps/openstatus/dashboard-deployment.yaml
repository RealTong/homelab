apiVersion: apps/v1
kind: Deployment
metadata:
  name: openstatus-dashboard
  namespace: observability
  labels:
    app: openstatus-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openstatus-dashboard
  template:
    metadata:
      labels:
        app: openstatus-dashboard
    spec:
      containers:
        - name: openstatus-dashboard
          image: ghcr.io/realtong/openstatus-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NODE_ENV
              value: production
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: SELF_HOST
              value: "true"
            - name: DATABASE_URL
              value: http://openstatus-libsql:8080
            - name: DATABASE_AUTH_TOKEN
              value: ""
            - name: NEXT_PUBLIC_URL
              value: https://status.wst.sh
            - name: NEXT_PUBLIC_STATUS_PAGE_DOMAIN
              value: status.wst.sh
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: openstatus-secret
                  key: AUTH_SECRET
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: openstatus-secret
                  key: CRON_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openstatus-secret
                  key: RESEND_API_KEY
            - name: AUTH_GITHUB_ID
              value: ""
            - name: AUTH_GITHUB_SECRET
              value: ""
            - name: AUTH_GOOGLE_ID
              value: ""
            - name: AUTH_GOOGLE_SECRET
              value: ""
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: openstatus-oidc-secret
                  key: OIDC_ISSUER
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: openstatus-oidc-secret
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openstatus-oidc-secret
                  key: OIDC_CLIENT_SECRET
                  optional: true
            - name: OIDC_DISPLAY_NAME
              valueFrom:
                secretKeyRef:
                  name: openstatus-oidc-secret
                  key: OIDC_DISPLAY_NAME
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
