apiVersion: apps/v1
kind: Deployment
metadata:
  name: cli-proxy-api
  namespace: homelab
  annotations:
    glance/icon: simple-icons:openai
    glance/name: "CLIProxyAPI"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cli-proxy-api
  template:
    metadata:
      labels:
        app: cli-proxy-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: "realtong-server"
      containers:
        - name: cli-proxy-api
          image: ttl.sh/realtong-cli-proxy-api-amd64-1776507854:24h
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8317
          volumeMounts:
            - name: auth-data
              mountPath: /root/.cli-proxy-api
            - name: config
              mountPath: /CLIProxyAPI/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: logs
              mountPath: /CLIProxyAPI/logs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8317
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8317
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: auth-data
          persistentVolumeClaim:
            claimName: cli-proxy-api-pvc
        - name: config
          secret:
            secretName: cli-proxy-api-secret
        - name: logs
          emptyDir: {}
