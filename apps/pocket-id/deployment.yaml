apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocket-id
  namespace: auth
  labels:
    app: pocket-id
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pocket-id
  template:
    metadata:
      labels:
        app: pocket-id
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: pocket-id
          image: ghcr.io/pocket-id/pocket-id:v2.4.0
          ports:
            - containerPort: 1411
          env:
            - name: APP_URL
              value: "https://id.realtong.cn"
            - name: APP_NAME
              value: "RealTong's ID"
            - name: TRUST_PROXY
              value: "true"
            - name: UI_CONFIG_DISABLED
              value: "true"
            - name: HOME_PAGE_URL
              value: "/settings/account"
            - name: EMAILS_VERIFIED
              value: "true"
            - name: ALLOW_OWN_ACCOUNT_EDIT
              value: "true"
            - name: ALLOW_USER_SIGNUPS
              value: "disabled"
            - name: BACKGROUND_IMAGE
              value: "https://assets.realtong.cn/homelab-assets/login-bg.jpg"
            - name: GEOLITE_DB_URL
              value: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
            - name: UPLOAD_PATH
              value: "/data/uploads"
            # 从 ExternalSecret 中获取
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secret
                  key: ENCRYPTION_KEY
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secret
                  key: DB_CONNECTION_STRING

            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca-certificates.crt
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/certs/ca-certificates.crt
          volumeMounts:
            - name: pocket-id-pvc
              mountPath: /data/uploads
            - name: ca-cert
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
      volumes:
        - name: pocket-id-pvc
          persistentVolumeClaim:
            claimName: pocket-id-pvc
        - name: ca-cert
          hostPath: 
            path: /etc/ssl/certs/ca-certificates.crt
            type: File