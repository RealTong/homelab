apiVersion: apps/v1
kind: Deployment
metadata:
  name: manifest-postgres
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manifest-postgres
  template:
    metadata:
      labels:
        app: manifest-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: manifest
            - name: POSTGRES_DB
              value: manifest
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manifest-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U manifest -d manifest
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U manifest -d manifest
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: manifest-postgres-pvc
