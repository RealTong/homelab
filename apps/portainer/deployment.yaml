apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: observability
spec:
  selector:
    matchLabels:
      app: portainer
  template:
    metadata:
      labels:
        app: portainer
    spec:
      serviceAccountName: portainer
      nodeSelector:
        kubernetes.io/hostname: "realtong-server"
      containers:
      - name: portainer
        image: portainer/portainer-ce:2.43.0
        imagePullPolicy: Always
        env:
        ports:
        - containerPort: 9000
          protocol: TCP
        - containerPort: 9443
          protocol: TCP
        volumeMounts:
        - name: portainer-data
          mountPath: /data
      volumes:
      - name: portainer-data
        persistentVolumeClaim:
          claimName: portainer-pvc