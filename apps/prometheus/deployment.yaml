apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
  annotations:
    glance/icon: di:prometheus
    glance/name: "Prometheus"
spec:
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          image: prom/prometheus:v3.11.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: tmp-volume
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc
        - name: prometheus-config
          configMap:
            name: prometheus-configmap
            items:
            - key: prometheus.yml
              path: prometheus.yml
        - name: tmp-volume
          emptyDir: {}