apiVersion: apps/v1
kind: Deployment
metadata:
  name: qui
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qui
  template:
    metadata:
      labels:
        app: qui
    spec:
      nodeSelector:
        kubernetes.io/hostname: "realtong-server"
      containers:
        - name: qui
          image: ghcr.io/autobrr/qui:v1.16.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7476
              protocol: TCP
          env:
            - name: QUI__HOST
              value: "0.0.0.0"
            - name: QUI__PORT
              value: "7476"
            - name: QUI__OIDC_ENABLED
              value: "true"
            - name: QUI__OIDC_DISABLE_BUILT_IN_LOGIN
              value: "true"
            - name: QUI__OIDC_REDIRECT_URL
              value: "https://qb.wst.sh/api/auth/oidc/callback"
            - name: QUI__SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: qui-secret
                  key: QUI__SESSION_SECRET
            - name: QUI__OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: qui-secret
                  key: QUI__OIDC_CLIENT_ID
            - name: QUI__OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qui-secret
                  key: QUI__OIDC_CLIENT_SECRET
            - name: QUI__OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: qui-secret
                  key: QUI__OIDC_ISSUER
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/certs/ca-certificates.crt
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/ssl/certs/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /etc/ssl/certs/ca-certificates.crt
          volumeMounts:
            - name: qui-data
              mountPath: /config
            - name: ca-cert
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 7476
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 7476
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: qui-data
          persistentVolumeClaim:
            claimName: qui-pvc
        - name: ca-cert
          hostPath:
            path: /etc/ssl/certs/ca-certificates.crt
            type: File
