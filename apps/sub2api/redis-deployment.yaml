apiVersion: apps/v1
kind: Deployment
metadata:
  name: sub2api-redis
  namespace: homelab
  annotations:
    glance/icon: di:redis
    glance/name: "Sub2API Redis"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sub2api-redis
  template:
    metadata:
      labels:
        app: sub2api-redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: "realtong-server"
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:8-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --save
            - "60"
            - "1"
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-storage
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: sub2api-redis-pvc
        - name: tmp
          emptyDir: {}
