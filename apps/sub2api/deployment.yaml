apiVersion: apps/v1
kind: Deployment
metadata:
  name: sub2api
  namespace: homelab
  annotations:
    glance/icon: simple-icons:openai
    glance/name: "Sub2API"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sub2api
  template:
    metadata:
      labels:
        app: sub2api
    spec:
      nodeSelector:
        kubernetes.io/hostname: "realtong-server"
      containers:
        - name: sub2api
          image: weishaw/sub2api:0.1.129
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AUTO_SETUP
              value: "true"
            - name: SERVER_HOST
              value: 0.0.0.0
            - name: SERVER_PORT
              value: "8080"
            - name: SERVER_MODE
              value: release
            - name: RUN_MODE
              value: standard
            - name: TZ
              value: Asia/Shanghai
            - name: DATABASE_HOST
              value: sub2api-postgres
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_USER
              value: sub2api
            - name: DATABASE_DBNAME
              value: sub2api
            - name: DATABASE_SSLMODE
              value: disable
            - name: DATABASE_MAX_OPEN_CONNS
              value: "50"
            - name: DATABASE_MAX_IDLE_CONNS
              value: "10"
            - name: DATABASE_CONN_MAX_LIFETIME_MINUTES
              value: "30"
            - name: DATABASE_CONN_MAX_IDLE_TIME_MINUTES
              value: "5"
            - name: REDIS_HOST
              value: sub2api-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_DB
              value: "0"
            - name: REDIS_POOL_SIZE
              value: "1024"
            - name: REDIS_MIN_IDLE_CONNS
              value: "10"
            - name: REDIS_ENABLE_TLS
              value: "false"
            - name: ADMIN_EMAIL
              value: i@realtong.cn
            - name: JWT_EXPIRE_HOUR
              value: "24"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sub2api-secret
                  key: POSTGRES_PASSWORD
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sub2api-secret
                  key: ADMIN_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sub2api-secret
                  key: JWT_SECRET
            - name: TOTP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: sub2api-secret
                  key: TOTP_ENCRYPTION_KEY
          volumeMounts:
            - name: sub2api-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: sub2api-data
          persistentVolumeClaim:
            claimName: sub2api-data-pvc
