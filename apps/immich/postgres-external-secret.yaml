apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-postgres-secret
  namespace: databases
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: onepassword-store
    kind: ClusterSecretStore
  target:
    name: immich-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: immich/POSTGRES_PASSWORD
