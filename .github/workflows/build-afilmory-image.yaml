name: Build Afilmory image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-afilmory-image.yaml
      - apps/afilmory/Dockerfile
      - apps/afilmory/start.sh
      - apps/afilmory/config.json
      - apps/afilmory/builder.config.ts
      - apps/afilmory/patches/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out homelab
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: apps/afilmory
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/realtong/afilmory:4843875-runtime-r2
            ghcr.io/realtong/afilmory:latest
          build-args: |
            AFILMORY_REF=4843875f26f48343b08814e3282b3c4565a78c58
