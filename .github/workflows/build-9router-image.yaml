name: Build 9Router image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-9router-image.yaml
      - apps/9router/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out 9Router
        uses: actions/checkout@v4
        with:
          repository: decolua/9router
          ref: 7ad538bcf248a563e78f984bf64e66286058917f

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/realtong/9router:0.4.29
            ghcr.io/realtong/9router:7ad538b
